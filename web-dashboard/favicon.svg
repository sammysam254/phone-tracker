<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield background -->
  <path d="M50 10 L80 25 L80 50 Q80 75 50 90 Q20 75 20 50 L20 25 Z" fill="url(#grad)"/>
  
  <!-- Shield outline -->
  <path d="M50 10 L80 25 L80 50 Q80 75 50 90 Q20 75 20 50 L20 25 Z" fill="none" stroke="#fff" stroke-width="2"/>
  
  <!-- Eye icon (monitoring symbol) -->
  <ellipse cx="50" cy="45" rx="20" ry="12" fill="#fff" opacity="0.9"/>
  <circle cx="50" cy="45" r="8" fill="#667eea"/>
  <circle cx="50" cy="45" r="4" fill="#fff"/>
  
  <!-- Check mark -->
  <path d="M40 60 L45 65 L60 50" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
